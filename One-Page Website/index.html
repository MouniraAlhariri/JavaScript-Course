<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mounira AlHariri - Portfolio</title>
    <style>
        :root { 
            --primary-color: #2a9d8f; 
            --bg-color: #f4f1de; 
            --modal-bg: rgba(0, 0, 0, 0.9);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; color: #333; line-height: 1.6; }
        
        nav { background-color: var(--primary-color); padding: 15px; position: sticky; top: 0; text-align: center; z-index: 1000; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }

        section { padding: 60px 20px; max-width: 800px; margin: auto; }
        #home, #video { background-color: white; }
        #pictures, #contact { background-color: var(--bg-color); }

        /* Gallery Styling */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery-grid img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: transform 0.3s ease;
        }

        .gallery-grid img:hover { transform: scale(1.03); }

        /* Lightbox (Modal) Styling */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-bg);
            justify-content: center;
            align-items: center;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 80%;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Form Styling */
        form { display: flex; flex-direction: column; gap: 10px; }
        input, textarea, button { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        button { background-color: var(--primary-color); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }

        footer { background-color: var(--primary-color); color: white; text-align: center; padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="#pictures">Gallery</a>
        <a href="#video">Video</a>
        <a href="#contact">Contact</a>
    </nav>

    <section id="home">
        <h1>Welcome to Mounira AlHariri's Page</h1>
        <p>Hello! I am Mounira. Welcome to my personal website. Click on any image in the gallery below to view it in full size.</p>
    </section>

    <section id="pictures">
        <h2>Picture Gallery</h2>
        <div class="gallery-grid">
            <img src="https://picsum.photos/id/1018/1200/800" alt="Beautiful nature scenery">
            <img src="https://picsum.photos/id/1015/1200/800" alt="River in the mountains">
            <img src="https://picsum.photos/id/1019/1200/800" alt="Starry night sky">
        </div>
    </section>

    <!-- Lightbox Structure -->
    <div id="lightbox">
        <span id="lightbox-close">&times;</span>
        <img id="lightbox-img" src="" alt="Full size preview">
    </div>

    <section id="video">
        <h2>Featured Video</h2>
        <iframe width="100%" height="450" src="https://www.youtube.com/embed/LXb3EKWsInQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </section>

    <section id="contact">
        <h2>Contact Mounira</h2>
        <form action="#" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Mounira AlHariri. All rights reserved.</p>
    </footer>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('lightbox-close');
        const galleryImgs = document.querySelectorAll('.gallery-grid img');

        // Open Lightbox
        galleryImgs.forEach(img => {
            img.addEventListener('click', () => {
                lightbox.style.display = 'flex';
                lightboxImg.src = img.src;
            });
        });

        // Close Lightbox clicking the X
        closeBtn.addEventListener('click', () => {
            lightbox.style.display = 'none';
        });

        // Close Lightbox clicking outside the image
        lightbox.addEventListener('click', (e) => {
            if (e.target !== lightboxImg) {
                lightbox.style.display = 'none';
            }
        });
    </script>

</body>
</html>
